{% extends "base.html" %}
{% load app_tags %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}<i class="bi bi-plus-circle text-primary"></i> {{ title }}{% endblock %}

{% block content %}
<div class="stat-card p-4">
    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold"><i class="bi bi-person text-primary"></i> صاحب الرصيد</label>
                <select name="client" class="form-select form-select-lg" id="id_client" required style="border-radius:10px;">
                    <option value="">-- اختر العميل --</option>
                    {% for c in form.client.field.queryset %}
                    <option value="{{ c.id }}" {% if form.client.value|stringformat:"s" == c.id|stringformat:"s" %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold"><i class="bi bi-calendar text-primary"></i> التاريخ</label>
                <input type="date" name="date" class="form-control form-control-lg" value="{{ form.date.value|default:'' }}" required style="border-radius:10px;">
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-4">
                <label class="form-label fw-bold"><i class="bi bi-cash-stack text-success"></i> القيمة بالمصري (EGP)</label>
                <div class="input-group">
                    <input type="number" name="amount_egp" class="form-control form-control-lg" id="dep_egp" step="0.01" value="{{ form.amount_egp.value|default:'' }}" required style="border-radius:10px 0 0 10px;">
                    <span class="input-group-text" style="background:var(--success);color:#fff;border-radius:0 10px 10px 0;font-weight:700;">EGP</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold"><i class="bi bi-graph-up text-warning"></i> سعر الصرف</label>
                <input type="number" name="exchange_rate" class="form-control form-control-lg" id="dep_rate" step="0.01" value="{{ form.exchange_rate.value|default:'' }}" required style="border-radius:10px;">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold"><i class="bi bi-coins text-info"></i> المبلغ الليبي (LYD)</label>
                <div class="input-group">
                    <input type="number" name="amount_lyd" class="form-control form-control-lg" id="dep_lyd" step="0.01" value="{{ form.amount_lyd.value|default:'' }}" readonly style="background:var(--primary-bg);font-weight:700;color:var(--primary);border-radius:10px 0 0 10px;">
                    <span class="input-group-text" style="background:var(--info);color:#fff;border-radius:0 10px 10px 0;font-weight:700;">LYD</span>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <label class="form-label fw-bold"><i class="bi bi-sticky text-secondary"></i> ملاحظات</label>
            <textarea name="notes" class="form-control" rows="2" style="resize:none;border-radius:10px;" placeholder="أدخل ملاحظات اختيارية...">{{ form.notes.value|default:'' }}</textarea>
        </div>

        <div class="d-flex align-items-center gap-3 mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-primary btn-lg px-5" style="border-radius:10px;" onclick="return confirm('هل أنت متأكد من إيداع الرصيد؟')">
                <i class="bi bi-save"></i> {{ submit_label }}
            </button>
            <a href="{% url 'capital_list' %}" class="btn btn-outline-secondary btn-lg" style="border-radius:10px;">إلغاء</a>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const egp = document.getElementById('dep_egp');
    const rate = document.getElementById('dep_rate');
    const lyd = document.getElementById('dep_lyd');

    function calc() {
        const e = parseFloat(egp.value) || 0;
        const r = parseFloat(rate.value) || 0;
        if (e > 0 && r > 0) {
            lyd.value = (e / r).toFixed(2);
        } else {
            lyd.value = '';
        }
    }

    if (egp) egp.addEventListener('input', calc);
    if (rate) rate.addEventListener('input', calc);
    calc();
});
</script>
{% endblock %}
