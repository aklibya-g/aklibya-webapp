<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - شركة اليمامة المالية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Cairo,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);position:relative;overflow:hidden}
        body::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(37,99,235,.15) 0%,transparent 70%);animation:pulse 8s ease-in-out infinite}
        body::after{content:'';position:absolute;bottom:-50%;left:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(5,150,105,.1) 0%,transparent 70%);animation:pulse 10s ease-in-out infinite reverse}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .login-container{position:relative;z-index:10;width:100%;max-width:440px;padding:20px}
        .login-card{background:rgba(30,41,59,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:44px 36px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
        .logo-section{text-align:center;margin-bottom:36px}
        .logo-img{width:100px;height:100px;border-radius:50%;object-fit:cover;margin:0 auto 18px;display:block;border:3px solid rgba(255,255,255,.15);box-shadow:0 8px 32px rgba(0,0,0,.3)}
        .logo-section h1{color:#f59e0b;font-size:1.5rem;font-weight:900;margin-bottom:6px;text-shadow:0 0 20px rgba(245,158,11,.3)}
        .logo-section .subtitle{color:#94a3b8;font-size:.88rem;font-weight:600}
        .logo-section .divider{width:60px;height:3px;background:linear-gradient(90deg,#2563eb,#059669);border-radius:2px;margin:16px auto 0}
        .form-group{margin-bottom:22px}
        .form-group label{display:block;color:#94a3b8;font-size:.8rem;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
        .input-wrapper{position:relative}
        .input-wrapper i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;font-size:1.1rem}
        .input-wrapper input{width:100%;padding:14px 44px 14px 14px;border:2px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;font-family:Cairo,sans-serif;font-size:.95rem;font-weight:600;transition:all .3s}
        .input-wrapper input:focus{outline:none;border-color:#2563eb;background:rgba(37,99,235,.1);box-shadow:0 0 0 4px rgba(37,99,235,.2)}
        .input-wrapper input::placeholder{color:#475569}
        .toggle-pass{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:1.1rem;padding:4px;transition:color .2s}
        .toggle-pass:hover{color:#fff}
        .login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-family:Cairo,sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
        .login-btn:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af);transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.4)}
        .login-btn:active{transform:translateY(0)}
        .error-msg{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:10px;padding:12px 16px;color:#fca5a5;font-size:.85rem;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
        .footer-text{text-align:center;margin-top:28px;color:#475569;font-size:.72rem;font-weight:600}
        .footer-text span{color:#f59e0b}
        .floating-shapes{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
        .shape{position:absolute;border-radius:50%;opacity:.06}
        .shape-1{width:400px;height:400px;background:#2563eb;top:-150px;right:-150px;animation:float 15s ease-in-out infinite}
        .shape-2{width:300px;height:300px;background:#059669;bottom:-100px;left:-100px;animation:float 12s ease-in-out infinite reverse}
        .shape-3{width:200px;height:200px;background:#f59e0b;top:50%;left:15%;animation:float 18s ease-in-out infinite}
        .shape-4{width:150px;height:150px;background:#8b5cf6;bottom:20%;right:10%;animation:float 20s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(180deg)}}
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="/static/images/logo.jpeg" alt="شعار شركة اليمامة المالية" class="logo-img">
                <h1>شركة اليمامة المالية</h1>
                <p class="subtitle">نظام إدارة الحوالات والأرصدة</p>
                <div class="divider"></div>
            </div>
            
            {% if messages %}
            {% for msg in messages %}
            <div class="error-msg">
                <i class="bi bi-exclamation-triangle-fill"></i>
                {{ msg }}
            </div>
            {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person"></i>
                        <input type="text" name="username" placeholder="أدخل اسم المستخدم" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock"></i>
                        <input type="password" name="password" id="password" placeholder="أدخل كلمة المرور" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword()"><i class="bi bi-eye" id="passIcon"></i></button>
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    <i class="bi bi-box-arrow-in-left"></i>
                    تسجيل الدخول
                </button>
            </form>
            
            <div class="footer-text">
                جميع الحقوق محفوظة &copy; 2026 <span>شركة اليمامة المالية</span>
            </div>
        </div>
    </div>
    <script>
    function togglePassword() {
        var input = document.getElementById('password');
        var icon = document.getElementById('passIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
    </script>
</body>
</html>
